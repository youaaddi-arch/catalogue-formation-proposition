<style>
  :root {
    --navy: #0D1B2A;
    --gold: #C8952A;
    --cream: #F8F4EE;
    --text: #1a2535;
    --muted: #6B7A8D;
    --border: #E0D9D0;
    --badge-oblig: #C0392B;
    --badge-rs: #1A7340;
    --badge-comp: #1A4F8A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); font-size: 14px; }

  header {
    background: var(--navy);
    color: white;
    padding: 32px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; }
  header h1 span { color: var(--gold); }
  header p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }
  .header-stats { display: flex; gap: 24px; text-align: right; }
  .header-stats .sn { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--gold); display: block; }
  .header-stats .sl { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.4); }

  .main { padding: 32px 40px; }

  .stat-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: white; border-radius: 10px; padding: 14px 20px; min-width: 120px; border: 1px solid var(--border); }
  .stat-card .n { font-size: 24px; font-weight: 600; }
  .stat-card .l { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .controls input, .controls select {
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: white;
    color: var(--text);
    outline: none;
  }
  .controls input { flex: 1; min-width: 220px; }
  .controls input:focus, .controls select:focus { border-color: var(--gold); }

  .table-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: white; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--navy); }
  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: white; }
  thead th.sorted { color: var(--gold); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--cream); }
  tbody td { padding: 11px 16px; vertical-align: middle; }
  .name-cell { font-weight: 500; }
  .ref-cell { font-size: 12px; color: var(--muted); }

  .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 100px; font-weight: 600; white-space: nowrap; }
  .b-oblig { background: #FDECEA; color: var(--badge-oblig); }
  .b-cert  { background: #E8F5EE; color: var(--badge-rs); }
  .b-perf  { background: #EFF4FB; color: var(--badge-comp); }
  .b-cpf   { background: #FFF8E7; color: #8B5E0A; }
  .b-no    { background: #f0f0f0; color: #999; }

  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .count { font-size: 12px; color: var(--muted); text-align: right; margin-top: 10px; }

  footer { background: var(--navy); color: rgba(255,255,255,0.4); text-align: center; padding: 20px 40px; font-size: 12px; margin-top: 40px; }
  footer span { color: var(--gold); font-family: 'Playfair Display', serif; }

  @media (max-width: 768px) {
    header { flex-direction: column; align-items: flex-start; gap: 16px; padding: 24px 20px; }
    .main { padding: 20px; }
    .header-stats { flex-direction: row; text-align: left; }
  }
</style>
</head>

  </div>
  <div class="count" id="count"></div>
</div>

let sortKey = 'domain', sortDir = 1;

const domains = [...new Set(data.map(d => d.domain))];
const sel = document.getElementById('filterDomain');
domains.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; sel.appendChild(o); });

function badgeType(t) {
  if(t==='Obligatoire') return `<span class="badge b-oblig">Obligatoire</span>`;
  if(t==='Certification RS') return `<span class="badge b-cert">Certification RS</span>`;
  return `<span class="badge b-perf">Perfectionnement</span>`;
}
function badgeCpf(v) {
  if(v==='Oui') return `<span class="badge b-cpf">CPF</span>`;
  if(v==='Selon') return `<span class="badge b-no">Selon</span>`;
  return `<span class="badge b-no">—</span>`;
}
function badgeOpco(v) {
  if(v==='Oui') return `<span class="badge b-cert">Oui</span>`;
  return `<span class="badge b-no">Selon</span>`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const dom = document.getElementById('filterDomain').value;
  const typ = document.getElementById('filterType').value;
  const cpf = document.getElementById('filterCPF').value;

  const filtered = data.filter(r =>
    (!q || r.name.toLowerCase().includes(q) || r.domain.toLowerCase().includes(q) || r.ref.toLowerCase().includes(q)) &&
    (!dom || r.domain === dom) &&
    (!typ || r.type === typ) &&
    (!cpf || r.cpf === cpf)
  ).sort((a,b) => a[sortKey].localeCompare(b[sortKey], 'fr') * sortDir);

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.length === 0
    ? `<tr><td colspan="6" class="empty">Aucune formation trouvée.</td></tr>`
    : filtered.map(r => `<tr>
        <td>${r.domain}</td>
        <td class="name-cell">${r.name}</td>
        <td>${badgeType(r.type)}</td>
        <td class="ref-cell">${r.ref}</td>
        <td>${badgeCpf(r.cpf)}</td>
        <td>${badgeOpco(r.opco)}</td>
      </tr>`).join('');

  const oblig = filtered.filter(r=>r.type==='Obligatoire').length;
  const cert  = filtered.filter(r=>r.type==='Certification RS').length;
  const perf  = filtered.filter(r=>r.type==='Perfectionnement').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="n">${filtered.length}</div><div class="l">Formations</div></div>
    <div class="stat-card"><div class="n" style="color:var(--badge-oblig)">${oblig}</div><div class="l">Obligatoires</div></div>
    <div class="stat-card"><div class="n" style="color:var(--badge-comp)">${perf}</div><div class="l">Perfectionnement</div></div>
    <div class="stat-card"><div class="n" style="color:var(--badge-rs)">${cert}</div><div class="l">Certifications RS</div></div>
  `;
  document.getElementById('count').textContent = `${filtered.length} résultat${filtered.length > 1 ? 's' : ''}`;
}

function sort(k) {
  if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=1; }
  ['domain','name','type','cpf','opco'].forEach(x => {
    const el = document.getElementById('s-'+x);
    if(el) el.textContent = sortKey===x ? (sortDir===1?' ↑':' ↓') : '';
    const th = document.querySelector(`[onclick="sort('${x}')"]`);
    if(th) th.classList.toggle('sorted', sortKey===x);
  });
  render();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filterDomain').addEventListener('change', render);
document.getElementById('filterType').addEventListener('change', render);
document.getElementById('filterCPF').addEventListener('change', render);

render();
</script>
